<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANZ.EXE</title>
    <style>
        body {
            background-color: #000;
            color: #00FF00;
            font-family: 'Courier New', monospace;
            text-align: center;
            margin: 0;
            text-shadow: 0 0 8px #00FF00;
            overflow: hidden;
        }
        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
       .content {
            position: relative;
            z-index: 1;
            margin-top: 10%;
            padding: 20px;
        }
        h1 {
            font-size: 32px;
            animation: glitch 1.5s infinite;
        }
        a {
            color: #FF0000;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
        }
        #terminal {
            text-align: left;
            display: inline-block;
            font-size: 18px;
            white-space: pre;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border: 1px solid #00FF00;
        }
       .cursor {
            animation: blink 1s infinite;
        }
        @keyframes glitch {
            0% { text-shadow: 0 0 8px #00FF00; }
            50% { text-shadow: -2px 0 red, 2px 0 blue; }
            100% { text-shadow: 0 0 8px #00FF00; }
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    
    <div class="content">
        <a href="https://wa.me/6289529881106">💬 HUBUNGI HANZ</a>
        <br><br>
        <h1>ACCESS GRANTED: HANZ 👑</h1>
        <div id="terminal"></div><span class="cursor">█</span>
    </div>

    <audio autoplay loop hidden>
      <source src="https://files.catbox.moe/5x4x5x.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Efek Ketik LV 2
        const text = `[SYSTEM BOOT] 840 menit uptime\n[STATUS] Baterai: 48% | Otak: 0% | Skill: 9999%\n[LOG] Web Matrix LV 3 Online\n> Menunggu perintah selanjutnya...`;
        let i = 0;
        const speed = 40;
        
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("terminal").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }
        window.onload = typeWriter;

        // Efek Hujan Matrix LV 3
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
        const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const nums = '0123456789';
        const alphabet = katakana + latin + nums;
        
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const rainDrops = [];
        
        for(let x = 0; x < columns; x++) {
            rainDrops[x] = 1;
        }
        
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00FF00';
            ctx.font = fontSize + 'px monospace';
            
            for(let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                
                if(rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }
        setInterval(draw, 30);
    </script>
</body>
</html>
